name: Release CI

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Parse SDK versions
        id: parse-versions
        run: |
          COMPILE_SDK=$(grep -R "compileSdk" app/build.gradle.kts \
              | sed -E 's/.*compileSdk\s*=\s*([0-9]+).*/\1/' | head -n 1)
          if [ -z "$COMPILE_SDK" ]; then COMPILE_SDK=36; fi
          echo "Found compileSdk: $COMPILE_SDK"
          echo "COMPILE_SDK=$COMPILE_SDK" >> $GITHUB_ENV

      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platforms;android-36 ndk;25.2.9519653"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          SIGN_KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}
          SIGN_STORE_PASSWORD: ${{ secrets.SIGN_STORE_PASSWORD }}
        run: ./gradlew assembleRelease --build-cache --warning-mode all

      - name: Upload APK and Mapping to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/mapping.txt
          fail_on_unmatched_files: true